import = [
  "ayu-dark.toml"
]

[font]
size = 12

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"


[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

[general]

live_config_reload = true

[terminal]

[terminal.shell]
program = "wsl"

[window]
decorations = "none"
opacity = 1
dynamic_padding = false

[window.padding]
x = 20
y = 20

