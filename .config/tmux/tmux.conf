##### Core / compatibility #####
set -g allow-passthrough on
set -g extended-keys on
set -g extended-keys-format csi-u

# Load your reset file first (so our terminal settings below win)
source-file ~/.config/tmux/tmux.reset.conf

##### Color / TERM (WSL2 + Alacritty truecolor) #####
# IMPORTANT: must be tmux-256color (NOT 255)
set -g default-terminal "tmux-256color"

# Enable truecolor for all outer terminals
set -ga terminal-overrides ",*:Tc"

# Preserve these env vars when creating new panes/windows
set -ga update-environment "TERM TERM_PROGRAM COLORTERM"

##### UX #####
set -g mouse on

unbind C-b
set -g prefix C-a
bind C-Space send-prefix

##### Window/session behavior #####
set -g base-index 1
set -g detach-on-destroy off
set -g renumber-windows on

##### Plugins #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'alexwforsythe/tmux-which-key'

##### minimal-tmux-status (your settings) #####
set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-bg "#698DDA"
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator-str "  tmux  "
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-status "top"

set -g @minimal-tmux-right true
set -g @minimal-tmux-left true
set -g @minimal-tmux-expanded-icon "󰊓 "
set -g @minimal-tmux-show-expanded-icons-for-all-tabs true

set -g @minimal-tmux-status-right-extra ""
set -g @minimal-tmux-status-left-extra ""

set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""

set -g status-right-length 20
set -g status-left-length 20

##### Convenience #####
bind-key x kill-pane  # skip prompt
set -g @continuum-restore 'on'

# NOTE: you set status-right twice previously; keep ONE.
# If you want continuum status visible, uncomment this line:
# set -g status-right 'Continuum status: #{continuum_status}'

##### sesh binding (yours) #####
bind-key "s" run-shell "sesh connect \"$(
  sesh list -t | fzf-tmux -p 55%,60% \
    --no-sort --border-label ' sesh ' --prompt '󱐋   ' \
    --header '  ^a all ^t tmux ^x zoxide ^g config ^d tmux kill ^f find ^u tmuxinator' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(󱐋 )+reload(sesh list)' \
    --bind 'ctrl-t:change-prompt( )+reload(sesh list -t)' \
    --bind 'ctrl-g:change-prompt( )+reload(sesh list -c)' \
    --bind 'ctrl-x:change-prompt( )+reload(sesh list -z)' \
    --bind 'ctrl-f:change-prompt( )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-u:change-prompt( )+reload(sesh list -T)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(󱐋 )+reload(sesh list -t)'
)\""

# ALT-o: toggle between windows named "opencode" and "nvim" (create if missing)
bind-key -n M-o run-shell '
cur_name="$(tmux display-message -p "#{window_name}")"

find_window() {
  # $1 = window name
  # Pick the most recently active matching window
  # Use ## to escape format strings so tmux does not expand them before shell execution
  tmux list-windows -F "##{window_index} ##{window_name} ##{window_activity}" \
    | awk -v n="$1" '"'"'$2==n {print $1, $3}'"'"' \
    | sort -k2,2nr \
    | head -n1 \
    | awk '"'"'{print $1}'"'"'
}

goto_or_create() {
  # $1 = window name, $2 = command to run if missing
  idx="$(find_window "$1")"
  if [ -n "$idx" ]; then
    tmux select-window -t ":$idx"
  else
    tmux new-window -n "$1" "$2"
  fi
}

if [ "$cur_name" = "opencode" ]; then
  goto_or_create "nvim" "nvim"
else
  goto_or_create "opencode" "opencode --port"
fi
'

# When set to 'on' a non-result will be sent to zoxide for path matching
# Requires zoxide installed
set -g @sessionx-zoxide-mode 'on'

##### Status position #####
set -g status-position top

##### TPM init (MUST be last) #####
run '~/.tmux/plugins/tpm/tpm'
